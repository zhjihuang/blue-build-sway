---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: files
    files:
      - source: kernels/nvidia/
        destination: /
  - type: script
    snippets:
      - cp '/usr/lib/modprobe.d/nvidia-modeset.conf' '/etc/modprobe.d/nvidia-modeset.conf'
