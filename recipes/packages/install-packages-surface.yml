---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  # -------------------------------- 
  # Camera Support
  - type: dnf
    install:
      packages:
        - intel-vsc-firmware
        - libcamera
        - libcamera-tools
        - libcamera-gstreamer
        - libcamera-ipa
        - pipewire-plugin-libcamera
  - type: script
    snippets:
      - unxz --keep '/usr/lib/firmware/intel/ipu/irci_irci_ecr-master_20161208_0213_20170112_1500.bin.xz'
      - mv '/usr/lib/firmware/intel/ipu/irci_irci_ecr-master_20161208_0213_20170112_1500.bin' '/lib/firmware/intel/ipu3-fw.bin'
  # -------------------------------- 
  # Tablet Support
  - type: dnf
    install:
      packages:
        - iptsd
        - surface-dtx-daemon
  - type: systemd
    system:
      enabled:
        - surface-dtx-daemon.service

